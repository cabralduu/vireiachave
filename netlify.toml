[build]
  publish = "."
  functions = "netlify/functions"

# Redireciona /api/chat para a Netlify Function
[[redirects]]
  from = "/api/chat"
  to = "/.netlify/functions/chat"
  status = 200

# Garante que o SPA não quebre em refreshes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
